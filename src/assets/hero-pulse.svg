<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400" style="background:transparent">
  <defs>
    <filter id="glow-b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="grad-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fd1c5" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#38b2ac" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38b2ac" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer scanner rings -->
  <g opacity="0.55">
    <ellipse cx="250" cy="200" rx="200" ry="190" stroke="#4fd1c5" stroke-width="1.5" fill="none"/>
    <ellipse cx="250" cy="200" rx="170" ry="160" stroke="#4fd1c5" stroke-width="1.1" fill="none"/>
    <ellipse cx="250" cy="200" rx="140" ry="130" stroke="#4fd1c5" stroke-width="0.8" stroke-dasharray="5 8" fill="none"/>
  </g>

  <!-- Core pulse ring -->
  <ellipse cx="250" cy="200" rx="105" ry="98" stroke="#81e6d9" stroke-width="2.5" fill="none" opacity="0.95" filter="url(#glow-b)"/>

  <!-- Inner glow -->
  <ellipse cx="250" cy="200" rx="95" ry="88" fill="url(#grad-b)" opacity="0.4"/>

  <!-- ECG pulse line -->
  <path
    d="M50,200 L150,200 L160,180 L175,220 L190,140 L210,260 L230,200 L250,200 L260,170 L275,230 L290,120 L310,280 L330,200 L450,200"
    stroke="#9ff7ee"
    stroke-width="4"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow-b)"
  />

  <!-- Signal points -->
  <circle cx="150" cy="200" r="5" fill="#9ff7ee" opacity="1"/>
  <circle cx="330" cy="200" r="5" fill="#9ff7ee" opacity="1"/>
</svg>